name: Bug
description: Report a problem with MouseLock.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you were doing and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Add relevant Dalamud log lines if available.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before opening this issue
      options:
        - label: I have checked that XIVLauncher, Dalamud, and MouseLock are up to date.
          required: true
